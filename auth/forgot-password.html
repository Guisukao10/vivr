<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Esqueci minha senha · Vivr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F4F4F5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.logo-box{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;color:#fff}
.logo-name{font-size:1.4rem;font-weight:800;color:#0F0F0F;letter-spacing:-.04em}
.logo-name span{color:#7C3AED}
h2{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:.78rem;color:#888;text-align:center;margin-bottom:24px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888}
.field input{padding:10px 13px;border:1.5px solid #E4E4E7;border-radius:9px;font-family:inherit;font-size:.88rem;outline:none;transition:border .15s}
.field input:focus{border-color:#7C3AED}
.btn{width:100%;padding:11px;background:#7C3AED;color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.link-row{text-align:center;font-size:.78rem;color:#888;margin-top:18px}
.link-row a{color:#7C3AED;font-weight:600;text-decoration:none}
.link-row a:hover{text-decoration:underline}
.error{background:#FEF2F2;border:1px solid #FECDD3;border-radius:8px;padding:10px 12px;font-size:.76rem;color:#B91C1C;margin-bottom:14px;display:none}
.error.show{display:block}
.ok{background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:10px 12px;font-size:.76rem;color:#15803D;margin-bottom:14px;display:none}
.ok.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-box">v</div>
    <div class="logo-name">vi<span>vr</span></div>
  </div>
  <h2>Esqueci minha senha</h2>
  <div class="sub">Enviamos um link pro seu e-mail pra você definir uma senha nova.</div>

  <div class="error" id="errEl"></div>
  <div class="ok" id="okEl"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>
  <button class="btn" id="btnEnviar" onclick="enviar()">Enviar link de recuperação</button>

  <div class="link-row">
    <a href="login.html">← Voltar pro login</a>
  </div>
</div>

<script src="../assets/supabase.js"></script>
<script>
function enviar(){
  var email = document.getElementById('email').value.trim();
  var btn   = document.getElementById('btnEnviar');
  var err   = document.getElementById('errEl');
  var ok    = document.getElementById('okEl');
  err.classList.remove('show'); ok.classList.remove('show');

  if(!email){ err.textContent='Digite seu e-mail.'; err.classList.add('show'); return; }

  btn.disabled=true; btn.textContent='Enviando...';
  var redirectTo = window.location.origin + window.location.pathname.replace('forgot-password.html','reset-password.html');

  vivr.auth.recover(email, redirectTo).then(function(){
    ok.textContent='Link enviado! Confira seu e-mail (' + email + ') e clique nele pra definir a senha nova.';
    ok.classList.add('show');
    btn.textContent='Enviado ✓';
  }).catch(function(e){
    err.textContent = e.message || 'Não consegui enviar o e-mail agora.';
    err.classList.add('show');
    btn.disabled=false; btn.textContent='Enviar link de recuperação';
  });
}

document.addEventListener('keydown',function(e){ if(e.key==='Enter') enviar(); });
</script>
</body>
</html>
