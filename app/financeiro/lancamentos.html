<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lançamentos · Financeiro · Vivr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../../assets/shared.css"/>
<link rel="stylesheet" href="site-controle.css"/>
<style>
.lc-tipo-toggle{display:flex;gap:8px;margin-bottom:14px}
.lc-tipo-btn{flex:1;padding:12px;border-radius:10px;border:2px solid var(--color-border);background:#fff;font-size:.9rem;font-weight:700;cursor:pointer;color:var(--color-text-secondary)}
.lc-tipo-btn.on[data-tipo="despesa"]{border-color:#FCA5A5;background:#FEF2F2;color:#B91C1C}
.lc-tipo-btn.on[data-tipo="receita"]{border-color:#86EFAC;background:#F0FDF4;color:#15803D}
.lc-toggle-detalhes{background:none;border:none;color:var(--color-primary);font-size:.8rem;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:8px}
</style>
</head>
<body>
<nav class="vivr-nav">
  <a class="vivr-brand" href="../../">
    <div class="vivr-logo">v</div>
    <span class="vivr-name">vi<span>vr</span></span>
  </a>
  <div class="vivr-nav-links">
    <a class="vivr-link" href="../">🏠 <span class="nl">Home</span></a>
    <a class="vivr-link" href="../metas/">🎯 <span class="nl">Metas</span></a>
    <a class="vivr-link" href="../nutricao/">🥗 <span class="nl">Nutrição</span></a>
    <a class="vivr-link" href="../habitos/">✅ <span class="nl">Hábitos</span></a>
    <a class="vivr-link" href="../saude/">❤️ <span class="nl">Saúde</span></a>
    <a class="vivr-link" href="../grupo/">👥 <span class="nl">Grupo</span></a>
    <a class="vivr-link logout" href="#" id="btnLogout">Sair</a>
  </div>
</nav>

<div class="fin-subnav">
  <a href="index.html">📊 Análise</a>
  <a href="lancamentos.html" class="on">✍️ Lançamentos</a>
  <a href="cadastros.html">🗂️ Cadastros</a>
  <a href="planejador.html">📋 Planejador</a>
  <a href="importar.html">📥 Importar extrato</a>
</div>

<div class="content-area">
  <header class="page-header">
    <h1>Lançamentos</h1>
    <p>Cadastro e listagem de transações</p>
  </header>

  <div id="lancamentoFormWrap">
    <form class="panel" id="lancamentoForm">
      <h3>Novo lançamento</h3>

      <div class="lc-tipo-toggle">
        <button type="button" class="lc-tipo-btn on" data-tipo="despesa" id="btnTipoDespesa">💸 Gastei</button>
        <button type="button" class="lc-tipo-btn" data-tipo="receita" id="btnTipoReceita">💰 Recebi</button>
        <input type="hidden" id="tipo" value="despesa"/>
      </div>

      <!-- Mesma ordem da planilha: Data · Responsável · Categoria · Tipo · Descrição · Valor · Observação -->
      <div class="form-group">
        <div><label>Data</label><input type="date" id="data" required/></div>
        <div><label>Responsável</label><select id="responsavel"></select></div>
        <div><label>Categoria</label><select id="categoria"></select></div>
        <div><label>Tipo</label><select id="pagamento"></select></div>
      </div>
      <div class="form-group">
        <div style="flex:2"><label>Descrição</label><input type="text" id="descricao" list="descSuggestions" placeholder="Ex: Mercado, Ifood, Academia..." required autofocus/>
          <datalist id="descSuggestions"></datalist></div>
        <div><label>Valor (R$)</label><input type="number" id="valor" min="0.01" step="0.01" placeholder="0,00" required/></div>
        <div style="flex:2"><label>Observação</label><input type="text" id="obs" placeholder="Opcional"/></div>
      </div>

      <button type="button" class="lc-toggle-detalhes" id="btnToggleDetalhes">+ Mais detalhes (opcional)</button>
      <div class="form-group lc-detalhes" id="lcDetalhes" style="display:none">
        <div><label>Subcategoria</label><select id="subcategoria"></select></div>
        <div><label>Nova subcategoria</label><input type="text" id="subcategoriaNova" placeholder="Nome (se 'Criar nova')" disabled/></div>
      </div>
      <div class="form-group lc-detalhes" id="lcDetalhes2" style="display:none">
        <div><label>Status</label><select id="status"></select></div>
        <div><label>Recorrente?</label>
          <select id="recorrente"><option value="nao">Não</option><option value="sim">Sim</option></select>
        </div>
        <div><label>Fixo ou variável</label>
          <select id="fixoVariavel"><option value="variavel">Variável</option><option value="fixo">Fixo</option></select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Salvar lançamento</button>
      <button type="button" class="btn" id="btnCancelarEdicao" style="display:none">Cancelar edição</button>
    </form>
  </div>


  <div class="panel">
    <div class="form-group">
      <div><label>Buscar</label><input type="text" id="filtroTexto" placeholder="Descrição contém..."/></div>
      <div><label>Mês</label><input type="month" id="filtroCompetencia"/></div>
      <div><label>Tipo</label>
        <select id="filtroTipo"><option value="">Todos</option><option value="despesa">Despesa</option><option value="receita">Receita</option></select>
      </div>
      <div><label>Responsável</label><select id="filtroResponsavel"></select></div>
      <div><label>Categoria</label><select id="filtroCategoria"></select></div>
    </div>
    <button type="button" class="lc-toggle-detalhes" id="btnToggleMaisFiltros">+ Mais filtros</button>
    <div class="form-group lc-detalhes" id="maisFiltros" style="display:none">
      <div><label>Subcategoria</label><select id="filtroSubcategoria"></select></div>
      <div><label>Status</label><select id="filtroStatus"></select></div>
      <div><label>Fixo/Variável</label>
        <select id="filtroFixoVariavel"><option value="">Todos</option><option value="fixo">Fixo</option><option value="variavel">Variável</option></select>
      </div>
    </div>
    <button class="btn btn-small btn-primary" id="btnVerTudo" style="margin-top:10px">👁 Ver tudo</button>
    <button class="btn btn-small" id="btnLimparFiltros" style="margin-top:10px">× Limpar filtros</button>
    <p style="margin-top:10px;font-size:.85rem;color:var(--color-text-secondary)">
      <span id="contadorRegistros">0</span> lançamento(s) · <strong id="totalFiltrado">R$ 0,00</strong>
    </p>
  </div>

  <div class="panel">
    <div style="overflow-x:auto">
      <table class="grid-table" id="tabelaLancamentos">
        <thead>
          <tr>
            <th data-sort="data">Data</th>
            <th>Responsável</th>
            <th>Categoria</th>
            <th>Pagamento</th>
            <th>Descrição</th>
            <th data-sort="valor">Valor</th>
            <th>Observação</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../assets/supabase.js"></script>
<script>if(!requireAuth('../../auth/login.html')) throw '';</script>
<script src="utils.js"></script>
<script src="ui.js"></script>
<script src="storage.js"></script>
<script src="lancamentos.js"></script>
<script>
document.getElementById('btnLogout').addEventListener('click', function(){ vivr.auth.signOut().then(function(){window.location.href='../../auth/login.html';}); });
StorageService.initFinanceiro().then(function(){ LancamentosPage.init(); }).catch(function(e){
  document.getElementById('lancamentoForm').innerHTML = '<div class="panel" style="color:#B91C1C">⚠️ Não foi possível carregar agora ('+e.message+'). Tente recarregar a página.</div>';
});
</script>
</body>
</html>
